<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导航站</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body data-theme="dark">
  <main class="wrap">
    <div class="topbar">
      <div class="user-menu" id="userMenu">
        <button class="user-btn" id="userMenuBtn" type="button"><span id="currentUsername">admin</span> ▾</button>
        <div class="user-dropdown" id="userDropdown">
          <button class="menu-item" id="openSettingsBtn" type="button">设置</button>
          <button class="menu-item" id="openAccountBtn" type="button">修改账号密码</button>
          <button class="menu-item" id="logoutBtn" type="button">退出登录</button>
        </div>
      </div>
    </div>
    <section class="hero">
      <div>
        <div class="badge"><span class="badge-dot"></span> <span id="heroBadge">DEV PORTAL / 个人导航站</span></div>
        <h1><strong id="heroTitle">常用站点导航</strong></h1>
        <p class="sub" id="heroSubtitle">聚合了常用网站</p>
      </div>
      <div class="panel">
        <div class="search">🔎 <input id="searchInput" placeholder="搜索工具、文档、服务..." /></div>
        <div class="stats">
          <div class="stat"><b id="siteCount">0</b><small>常用站点</small></div>
          <div class="stat"><b id="categoryCount">0</b><small>分类分组</small></div>
          <div class="stat"><b id="coverage">99%</b><small>日常覆盖</small></div>
        </div>
      </div>
    </section>

    <nav class="tabs" id="categoryTabs">
    </nav>

    <div class="section-title">
      <h2>常用入口</h2>
      <div class="title-actions">
        <span>点击卡片快速访问</span>
        <button class="ghost-btn" id="manageCategoriesBtn" type="button">分类管理</button>
        <button class="primary-btn" id="addSiteBtn">+ 新增站点</button>
      </div>
    </div>
    <section class="grid" id="siteGrid">
    </section>
  </main>

  <div class="theme-switcher" id="themeSwitcher">
    <div class="theme-menu" id="themeMenu"></div>
    <button class="theme-toggle" id="themeToggleBtn" type="button" aria-haspopup="true" aria-expanded="false">
      <span class="theme-toggle-dot"></span>
      <span id="themeToggleText">主题：深空</span>
      <span>▴</span>
    </button>
  </div>

  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <h2>登录导航站</h2>
      <p>请输入管理员账号密码</p>
      <form class="auth-form" id="loginForm">
        <div class="field">
          <label for="loginUsername">账号</label>
          <input id="loginUsername" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="error" id="loginError"></div>
        <button class="primary-btn" type="submit">登录</button>
      </form>
    </div>
  </div>

  <div class="dialog-backdrop" id="siteDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="dialog-head">
        <h2 id="dialogTitle">新增站点</h2>
        <button class="close-btn" id="closeDialogBtn" type="button">×</button>
      </div>
      <form id="siteForm">
        <input type="hidden" id="siteId" />
        <div class="form-grid">
          <div class="field">
            <label for="name">名称</label>
            <input id="name" name="name" required />
          </div>
          <div class="field">
            <label for="category">分类</label>
            <div class="category-picker" id="categoryPicker">
              <div class="category-input-wrap">
                <input id="category" name="category" autocomplete="off" required />
                <button class="category-toggle" id="categoryToggle" type="button" aria-label="展开分类">🔽</button>
              </div>
              <div class="category-menu" id="categoryMenu"></div>
            </div>
          </div>
          <div class="field full">
            <label for="url">地址</label>
            <input id="url" name="url" type="url" placeholder="https://example.com" required />
          </div>
          <div class="field">
            <label for="icon">图标</label>
            <input type="hidden" id="icon" name="icon" />
            <button class="emoji-select" id="emojiSelectBtn" type="button">
              <span class="emoji-preview" id="emojiPreview">🔗</span>
              <span class="emoji-select-text">选择 emoji 图标</span>
              <span>›</span>
            </button>
          </div>
          <div class="field">
            <label for="sort">排序</label>
            <input id="sort" name="sort" type="number" min="1" />
          </div>
          <div class="field full">
            <label for="glow">光效颜色</label>
            <input type="hidden" id="glow" name="glow" />
            <div class="glow-picker" id="glowPicker"></div>
          </div>
          <div class="field full">
            <label for="description">描述</label>
            <textarea id="description" name="description"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <div class="error" id="formError"></div>
          <div>
            <button class="ghost-btn" type="button" id="cancelBtn">取消</button>
            <button class="primary-btn" type="submit">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="dialog-backdrop" id="categoryDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="categoryDialogTitle">
      <div class="dialog-head">
        <h2 id="categoryDialogTitle">分类管理</h2>
        <button class="close-btn" id="closeCategoryDialogBtn" type="button">×</button>
      </div>
      <div class="category-list" id="categoryList"></div>
    </div>
  </div>

  <div class="dialog-backdrop" id="emojiDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="emojiDialogTitle">
      <div class="dialog-head">
        <h2 id="emojiDialogTitle">选择图标</h2>
        <button class="close-btn" id="closeEmojiDialogBtn" type="button">×</button>
      </div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
  </div>

  <div class="dialog-backdrop" id="accountDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="accountDialogTitle">
      <div class="dialog-head">
        <h2 id="accountDialogTitle">修改账号密码</h2>
        <button class="close-btn" id="closeAccountDialogBtn" type="button">×</button>
      </div>
      <form id="accountForm">
        <div class="form-grid">
          <div class="field full">
            <label for="accountUsername">账号</label>
            <input id="accountUsername" required />
          </div>
          <div class="field full">
            <label for="currentPassword">当前密码</label>
            <input id="currentPassword" type="password" autocomplete="current-password" required />
          </div>
          <div class="field full">
            <label for="newPassword">新密码</label>
            <input id="newPassword" type="password" autocomplete="new-password" placeholder="留空则只修改账号" />
          </div>
        </div>
        <div class="form-actions">
          <div class="error" id="accountError"></div>
          <button class="primary-btn" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="dialog-backdrop" id="settingsDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="settingsDialogTitle">
      <div class="dialog-head">
        <h2 id="settingsDialogTitle">页面设置</h2>
        <button class="close-btn" id="closeSettingsDialogBtn" type="button">×</button>
      </div>
      <form id="settingsForm">
        <div class="form-grid">
          <div class="field full">
            <label for="siteTitleInput">Title</label>
            <input id="siteTitleInput" required />
          </div>
          <div class="field full">
            <label for="badgeInput">徽章</label>
            <input id="badgeInput" required />
          </div>
          <div class="field full">
            <label for="heroTitleInput">主标题</label>
            <input id="heroTitleInput" required />
          </div>
          <div class="field full">
            <label for="subtitleInput">简介</label>
            <textarea id="subtitleInput" required></textarea>
          </div>
        </div>
        <div class="form-actions">
          <div class="error" id="settingsError"></div>
          <button class="primary-btn" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/app.js" defer></script>
</body>
</html>
