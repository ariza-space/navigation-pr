<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导航站</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #eef4ff;
      background:
        radial-gradient(circle at 12% 10%, rgba(102,126,234,.36), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(236,72,153,.24), transparent 26%),
        radial-gradient(circle at 52% 88%, rgba(34,211,238,.18), transparent 32%),
        linear-gradient(135deg, #07111f 0%, #101827 48%, #111827 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.8), transparent 78%);
      pointer-events: none;
    }
    .wrap { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 56px 0 70px; position: relative; }
    .topbar { display:flex; justify-content:flex-end; margin-bottom:24px; position:relative; z-index:5; }
    .user-menu { position:relative; }
    .user-btn { height:42px; display:flex; align-items:center; gap:9px; padding:0 14px; border-radius:999px; border:1px solid rgba(255,255,255,.14); color:#dce9ff; background:rgba(255,255,255,.08); cursor:pointer; backdrop-filter:blur(16px); }
    .user-dropdown { position:absolute; right:0; top:calc(100% + 10px); display:none; min-width:170px; padding:8px; border-radius:16px; border:1px solid rgba(255,255,255,.14); background:rgba(8,15,30,.96); box-shadow:0 18px 44px rgba(0,0,0,.38); }
    .user-dropdown.open { display:block; }
    .menu-item { width:100%; display:block; padding:10px 11px; border:0; border-radius:12px; color:#dce9ff; background:transparent; text-align:left; cursor:pointer; }
    .menu-item:hover { background:rgba(255,255,255,.08); color:#fff; }
    .hero { display: grid; grid-template-columns: 1.2fr .8fr; gap: 26px; align-items: center; margin-bottom: 34px; }
    .badge { display:inline-flex; align-items:center; gap:8px; padding: 9px 14px; border:1px solid rgba(255,255,255,.14); border-radius:999px; background:rgba(255,255,255,.08); backdrop-filter: blur(16px); color:#b9d8ff; font-size:14px; }
    .badge-dot { width:8px; height:8px; border-radius:50%; background:#22d3ee; box-shadow:0 0 18px #22d3ee; flex:0 0 auto; }
    h1 { font-size: clamp(38px, 6vw, 76px); line-height: 1.02; letter-spacing: -3px; margin: 20px 0 16px; }
    h1 strong { background: linear-gradient(90deg,#93c5fd,#c084fc,#f9a8d4); -webkit-background-clip:text; color:transparent; }
    .sub { color:#9fb3cf; font-size:17px; line-height:1.8; max-width: 650px; }
    .panel { padding: 24px; border-radius: 28px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.08); box-shadow: 0 24px 80px rgba(0,0,0,.34); backdrop-filter: blur(18px); }
    .search { display:flex; align-items:center; gap:12px; height:58px; padding:0 18px; border-radius:18px; background: rgba(8,15,30,.7); border:1px solid rgba(255,255,255,.12); color:#dce9ff; margin-bottom:16px; }
    .search input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:16px; }
    .search input::placeholder { color:#71839f; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .stat { padding:16px 14px; border-radius:18px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10); }
    .stat b { display:block; font-size:26px; margin-bottom:3px; }
    .stat small { color:#8ea4c4; }
    .tabs { display:flex; gap:10px; flex-wrap:wrap; margin: 16px 0 24px; }
    button { font: inherit; }
    .tab { padding:10px 15px; border-radius:999px; color:#b9c9df; background: rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10); font-size:14px; cursor:pointer; }
    .tab.active { color:#07111f; background: linear-gradient(90deg,#93c5fd,#67e8f9); border-color:transparent; font-weight:700; }
    .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:18px; }
    .card { position:relative; min-height:170px; padding:22px; border-radius:28px; text-decoration:none; color:#fff; background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.055)); border:1px solid rgba(255,255,255,.13); box-shadow: 0 18px 52px rgba(0,0,0,.22); overflow:hidden; transition:.25s ease; }
    .card::before { content:""; position:absolute; width:130px; height:130px; right:-40px; top:-46px; border-radius:50%; background: var(--glow); filter: blur(2px); opacity:.62; }
    .card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,.30); box-shadow: 0 26px 70px rgba(0,0,0,.34); }
    .icon { width:48px; height:48px; display:grid; place-items:center; border-radius:16px; background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.12); font-size:24px; margin-bottom:20px; position:relative; }
    .card h3 { font-size:19px; margin-bottom:8px; position:relative; }
    .card p { color:#a9bad2; line-height:1.6; font-size:14px; position:relative; }
    .arrow { position:absolute; right:20px; bottom:18px; color:#8fb7ff; font-size:20px; opacity:.75; }
    .card-actions { position:absolute; top:14px; right:14px; display:flex; gap:8px; z-index:2; opacity:0; transition:.2s ease; }
    .card:hover .card-actions { opacity:1; }
    .icon-btn { width:32px; height:32px; border-radius:11px; border:1px solid rgba(255,255,255,.16); background:rgba(8,15,30,.72); color:#dce9ff; cursor:pointer; }
    .icon-btn:hover { background:rgba(255,255,255,.14); color:#fff; }
    .section-title { display:flex; align-items:end; justify-content:space-between; margin: 26px 0 16px; }
    .section-title h2 { font-size:24px; }
    .title-actions { display:flex; align-items:center; gap:12px; }
    .title-actions span { color:#8194af; font-size:14px; }
    .primary-btn { height:40px; padding:0 15px; border-radius:14px; border:0; color:#07111f; background:linear-gradient(90deg,#93c5fd,#67e8f9); font-weight:700; cursor:pointer; }
    .empty { grid-column:1 / -1; min-height:170px; display:grid; place-items:center; border:1px dashed rgba(255,255,255,.16); border-radius:28px; color:#8ea4c4; background:rgba(255,255,255,.05); }
    .dialog-backdrop { position:fixed; inset:0; display:none; place-items:center; padding:24px; background:rgba(2,6,23,.72); backdrop-filter:blur(12px); z-index:10; }
    .dialog-backdrop.open { display:grid; }
    .dialog { width:min(560px,100%); border-radius:24px; border:1px solid rgba(255,255,255,.14); background:#0b1424; box-shadow:0 30px 90px rgba(0,0,0,.42); padding:24px; }
    .dialog-head { display:flex; justify-content:space-between; align-items:center; gap:18px; margin-bottom:18px; }
    .dialog-head h2 { font-size:22px; }
    .close-btn { width:36px; height:36px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:#dce9ff; cursor:pointer; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .field { display:flex; flex-direction:column; gap:8px; }
    .field.full { grid-column:1 / -1; }
    .field label { color:#a9bad2; font-size:13px; }
    .field input, .field textarea { width:100%; border:1px solid rgba(255,255,255,.12); border-radius:14px; background:rgba(8,15,30,.78); color:#fff; outline:none; padding:12px 13px; font-size:15px; }
    .field input:focus, .field textarea:focus { border-color:rgba(103,232,249,.42); box-shadow:0 0 0 3px rgba(34,211,238,.12); }
    .field textarea { min-height:86px; resize:vertical; }
    .category-picker { position:relative; }
    .category-input-wrap { display:flex; align-items:center; border:1px solid rgba(255,255,255,.12); border-radius:14px; background:rgba(8,15,30,.78); overflow:hidden; transition:.18s ease; }
    .category-input-wrap:focus-within { border-color:rgba(103,232,249,.42); box-shadow:0 0 0 3px rgba(34,211,238,.12); }
    .category-input-wrap input { border:0; box-shadow:none; background:transparent; border-radius:0; padding-right:8px; }
    .category-input-wrap input:focus { box-shadow:none; }
    .category-toggle { width:42px; align-self:stretch; border:0; border-left:1px solid rgba(255,255,255,.10); color:#b9d8ff; background:rgba(255,255,255,.045); cursor:pointer; }
    .category-toggle:hover { color:#fff; background:rgba(255,255,255,.09); }
    .category-menu { position:absolute; left:0; right:0; top:calc(100% + 8px); display:none; max-height:210px; overflow:auto; padding:8px; border-radius:16px; border:1px solid rgba(255,255,255,.14); background:rgba(8,15,30,.96); box-shadow:0 18px 44px rgba(0,0,0,.38); z-index:20; }
    .category-menu.open { display:block; }
    .category-option { width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 11px; border:0; border-radius:12px; color:#dce9ff; background:transparent; text-align:left; cursor:pointer; }
    .category-option:hover { background:rgba(255,255,255,.08); }
    .category-option.active { color:#07111f; background:linear-gradient(90deg,#93c5fd,#67e8f9); font-weight:700; }
    .category-option small { color:inherit; opacity:.68; }
    .category-empty { padding:10px 11px; color:#8ea4c4; font-size:13px; line-height:1.5; }
    .glow-picker { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
    .glow-option { height:42px; display:flex; align-items:center; justify-content:center; gap:8px; border-radius:14px; border:1px solid rgba(255,255,255,.12); color:#dce9ff; background:rgba(8,15,30,.62); cursor:pointer; }
    .glow-option::before { content:""; width:15px; height:15px; border-radius:50%; background:var(--swatch); box-shadow:0 0 18px var(--swatch); }
    .glow-option:hover { border-color:rgba(255,255,255,.26); background:rgba(255,255,255,.08); }
    .glow-option.active { color:#07111f; border-color:transparent; background:linear-gradient(90deg,#93c5fd,#67e8f9); font-weight:700; }
    .glow-option.active::before { box-shadow:0 0 0 3px rgba(7,17,31,.18), 0 0 18px var(--swatch); }
    .emoji-select { width:100%; height:46px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:0 13px; border-radius:14px; border:1px solid rgba(255,255,255,.12); color:#dce9ff; background:rgba(8,15,30,.78); cursor:pointer; }
    .emoji-select:hover { border-color:rgba(255,255,255,.26); background:rgba(255,255,255,.08); }
    .emoji-preview { width:30px; height:30px; display:grid; place-items:center; border-radius:10px; background:rgba(255,255,255,.10); font-size:20px; }
    .emoji-select-text { flex:1; text-align:left; }
    .emoji-grid { display:grid; grid-template-columns:repeat(10, minmax(0, 1fr)); gap:9px; max-height:390px; overflow:auto; }
    .emoji-option { height:42px; border-radius:14px; border:1px solid rgba(255,255,255,.12); color:#fff; background:rgba(8,15,30,.62); cursor:pointer; font-size:21px; }
    .emoji-option:hover { border-color:rgba(255,255,255,.26); background:rgba(255,255,255,.08); }
    .emoji-option.active { border-color:rgba(103,232,249,.58); background:rgba(103,232,249,.16); box-shadow:0 0 0 3px rgba(34,211,238,.10); }
    .form-actions { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:18px; }
    .error { color:#fca5a5; font-size:14px; min-height:20px; }
    .ghost-btn { height:40px; padding:0 15px; border-radius:14px; border:1px solid rgba(255,255,255,.14); color:#dce9ff; background:rgba(255,255,255,.06); cursor:pointer; }
    .danger-btn { height:34px; padding:0 12px; border-radius:12px; border:1px solid rgba(248,113,113,.32); color:#fecaca; background:rgba(127,29,29,.24); cursor:pointer; }
    .danger-btn:hover { background:rgba(127,29,29,.42); color:#fff; }
    .category-list { display:flex; flex-direction:column; gap:10px; max-height:420px; overflow:auto; }
    .category-row { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:13px 14px; border-radius:16px; border:1px solid rgba(255,255,255,.11); background:rgba(255,255,255,.055); }
    .category-info b { display:block; margin-bottom:3px; }
    .category-info small { color:#8ea4c4; }
    .auth-screen { position:fixed; inset:0; display:grid; place-items:center; padding:24px; background:rgba(2,6,23,.86); backdrop-filter:blur(16px); z-index:30; }
    .auth-screen.hidden { display:none; }
    .auth-card { width:min(430px,100%); padding:28px; border-radius:28px; border:1px solid rgba(255,255,255,.14); background:rgba(11,20,36,.94); box-shadow:0 30px 90px rgba(0,0,0,.46); }
    .auth-card h2 { font-size:28px; margin-bottom:8px; }
    .auth-card p { color:#9fb3cf; line-height:1.7; margin-bottom:20px; }
    .auth-form { display:flex; flex-direction:column; gap:14px; }
    @media (max-width: 950px){ .hero{grid-template-columns:1fr;} .grid{grid-template-columns:repeat(2,1fr);} }
    @media (max-width: 560px){ .wrap{width:min(100% - 24px,1180px); padding-top:28px;} .grid{grid-template-columns:1fr;} .stats{grid-template-columns:1fr;} h1{letter-spacing:-1px;} .section-title{align-items:flex-start; gap:12px; flex-direction:column;} .form-grid{grid-template-columns:1fr;} .card-actions{opacity:1;} }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="user-menu" id="userMenu">
        <button class="user-btn" id="userMenuBtn" type="button"><span id="currentUsername">admin</span> ▾</button>
        <div class="user-dropdown" id="userDropdown">
          <button class="menu-item" id="openSettingsBtn" type="button">设置</button>
          <button class="menu-item" id="openAccountBtn" type="button">修改账号密码</button>
          <button class="menu-item" id="logoutBtn" type="button">退出登录</button>
        </div>
      </div>
    </div>
    <section class="hero">
      <div>
        <div class="badge"><span class="badge-dot"></span> <span id="heroBadge">DEV PORTAL / 个人导航站</span></div>
        <h1><strong id="heroTitle">常用站点导航</strong></h1>
        <p class="sub" id="heroSubtitle">聚合了常用网站</p>
      </div>
      <div class="panel">
        <div class="search">🔎 <input id="searchInput" placeholder="搜索工具、文档、服务..." /></div>
        <div class="stats">
          <div class="stat"><b id="siteCount">0</b><small>常用站点</small></div>
          <div class="stat"><b id="categoryCount">0</b><small>分类分组</small></div>
          <div class="stat"><b id="coverage">99%</b><small>日常覆盖</small></div>
        </div>
      </div>
    </section>

    <nav class="tabs" id="categoryTabs">
    </nav>

    <div class="section-title">
      <h2>常用入口</h2>
      <div class="title-actions">
        <span>点击卡片快速访问</span>
        <button class="ghost-btn" id="manageCategoriesBtn" type="button">分类管理</button>
        <button class="primary-btn" id="addSiteBtn">+ 新增站点</button>
      </div>
    </div>
    <section class="grid" id="siteGrid">
    </section>
  </main>

  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <h2>登录导航站</h2>
      <p>请输入管理员账号密码。默认账号密码为 admin / admin。</p>
      <form class="auth-form" id="loginForm">
        <div class="field">
          <label for="loginUsername">账号</label>
          <input id="loginUsername" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="error" id="loginError"></div>
        <button class="primary-btn" type="submit">登录</button>
      </form>
    </div>
  </div>

  <div class="dialog-backdrop" id="siteDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div class="dialog-head">
        <h2 id="dialogTitle">新增站点</h2>
        <button class="close-btn" id="closeDialogBtn" type="button">×</button>
      </div>
      <form id="siteForm">
        <input type="hidden" id="siteId" />
        <div class="form-grid">
          <div class="field">
            <label for="name">名称</label>
            <input id="name" name="name" required />
          </div>
          <div class="field">
            <label for="category">分类</label>
            <div class="category-picker" id="categoryPicker">
              <div class="category-input-wrap">
                <input id="category" name="category" autocomplete="off" required />
                <button class="category-toggle" id="categoryToggle" type="button" aria-label="展开分类">🔽</button>
              </div>
              <div class="category-menu" id="categoryMenu"></div>
            </div>
          </div>
          <div class="field full">
            <label for="url">地址</label>
            <input id="url" name="url" type="url" placeholder="https://example.com" required />
          </div>
          <div class="field">
            <label for="icon">图标</label>
            <input type="hidden" id="icon" name="icon" />
            <button class="emoji-select" id="emojiSelectBtn" type="button">
              <span class="emoji-preview" id="emojiPreview">🔗</span>
              <span class="emoji-select-text">选择 emoji 图标</span>
              <span>›</span>
            </button>
          </div>
          <div class="field">
            <label for="sort">排序</label>
            <input id="sort" name="sort" type="number" min="1" />
          </div>
          <div class="field full">
            <label for="glow">光效颜色</label>
            <input type="hidden" id="glow" name="glow" />
            <div class="glow-picker" id="glowPicker"></div>
          </div>
          <div class="field full">
            <label for="description">描述</label>
            <textarea id="description" name="description"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <div class="error" id="formError"></div>
          <div>
            <button class="ghost-btn" type="button" id="cancelBtn">取消</button>
            <button class="primary-btn" type="submit">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="dialog-backdrop" id="categoryDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="categoryDialogTitle">
      <div class="dialog-head">
        <h2 id="categoryDialogTitle">分类管理</h2>
        <button class="close-btn" id="closeCategoryDialogBtn" type="button">×</button>
      </div>
      <div class="category-list" id="categoryList"></div>
    </div>
  </div>

  <div class="dialog-backdrop" id="emojiDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="emojiDialogTitle">
      <div class="dialog-head">
        <h2 id="emojiDialogTitle">选择图标</h2>
        <button class="close-btn" id="closeEmojiDialogBtn" type="button">×</button>
      </div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
  </div>

  <div class="dialog-backdrop" id="accountDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="accountDialogTitle">
      <div class="dialog-head">
        <h2 id="accountDialogTitle">修改账号密码</h2>
        <button class="close-btn" id="closeAccountDialogBtn" type="button">×</button>
      </div>
      <form id="accountForm">
        <div class="form-grid">
          <div class="field full">
            <label for="accountUsername">账号</label>
            <input id="accountUsername" required />
          </div>
          <div class="field full">
            <label for="currentPassword">当前密码</label>
            <input id="currentPassword" type="password" autocomplete="current-password" required />
          </div>
          <div class="field full">
            <label for="newPassword">新密码</label>
            <input id="newPassword" type="password" autocomplete="new-password" placeholder="留空则只修改账号" />
          </div>
        </div>
        <div class="form-actions">
          <div class="error" id="accountError"></div>
          <button class="primary-btn" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div class="dialog-backdrop" id="settingsDialog" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="settingsDialogTitle">
      <div class="dialog-head">
        <h2 id="settingsDialogTitle">页面设置</h2>
        <button class="close-btn" id="closeSettingsDialogBtn" type="button">×</button>
      </div>
      <form id="settingsForm">
        <div class="form-grid">
          <div class="field full">
            <label for="siteTitleInput">浏览器标题</label>
            <input id="siteTitleInput" required />
          </div>
          <div class="field full">
            <label for="badgeInput">Badge 文案</label>
            <input id="badgeInput" required />
          </div>
          <div class="field full">
            <label for="heroTitleInput">H1 标题</label>
            <input id="heroTitleInput" required />
          </div>
          <div class="field full">
            <label for="subtitleInput">Sub 文案</label>
            <textarea id="subtitleInput" required></textarea>
          </div>
        </div>
        <div class="form-actions">
          <div class="error" id="settingsError"></div>
          <button class="primary-btn" type="submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const emojiOptions = [
      '🔗', '🌐', '🏠', '⭐', '📌', '🔍', '💻', '🖥️', '⌨️', '🧑‍💻',
      '🚀', '🛰️', '⚙️', '🛠️', '🧰', '🔧', '📊', '📈', '📉', '🧾',
      '🧠', '📚', '📖', '📝', '📄', '🗂️', '🗄️', '💾', '🧮', '🧪',
      '🎨', '🖌️', '🧩', '🎯', '✅', '📋', '🗓️', '⏱️', '🔔', '📬',
      '🔐', '🛡️', '🔑', '☁️', '📦', '🧭', '💬', '🤖', '⚡', '🔥'
    ];

    const glowOptions = [
      { name: '星蓝', value: 'rgba(96,165,250,.45)' },
      { name: '青 cyan', value: 'rgba(34,211,238,.45)' },
      { name: '紫光', value: 'rgba(168,85,247,.45)' },
      { name: '玫红', value: 'rgba(244,114,182,.45)' },
      { name: '薄荷', value: 'rgba(52,211,153,.45)' },
      { name: '琥珀', value: 'rgba(251,191,36,.45)' },
      { name: '靛蓝', value: 'rgba(129,140,248,.45)' },
      { name: '蓝绿', value: 'rgba(45,212,191,.45)' }
    ];

    const state = {
      sites: [],
      categories: [],
      category: '全部',
      query: '',
      user: null,
      settings: null
    };

    const els = {
      tabs: document.querySelector('#categoryTabs'),
      grid: document.querySelector('#siteGrid'),
      search: document.querySelector('#searchInput'),
      siteCount: document.querySelector('#siteCount'),
      categoryCount: document.querySelector('#categoryCount'),
      coverage: document.querySelector('#coverage'),
      addBtn: document.querySelector('#addSiteBtn'),
      manageCategoriesBtn: document.querySelector('#manageCategoriesBtn'),
      dialog: document.querySelector('#siteDialog'),
      closeBtn: document.querySelector('#closeDialogBtn'),
      cancelBtn: document.querySelector('#cancelBtn'),
      form: document.querySelector('#siteForm'),
      formError: document.querySelector('#formError'),
      dialogTitle: document.querySelector('#dialogTitle'),
      categoryInput: document.querySelector('#category'),
      categoryMenu: document.querySelector('#categoryMenu'),
      categoryToggle: document.querySelector('#categoryToggle'),
      iconInput: document.querySelector('#icon'),
      emojiSelectBtn: document.querySelector('#emojiSelectBtn'),
      emojiPreview: document.querySelector('#emojiPreview'),
      emojiDialog: document.querySelector('#emojiDialog'),
      closeEmojiDialogBtn: document.querySelector('#closeEmojiDialogBtn'),
      emojiGrid: document.querySelector('#emojiGrid'),
      glowInput: document.querySelector('#glow'),
      glowPicker: document.querySelector('#glowPicker'),
      categoryDialog: document.querySelector('#categoryDialog'),
      closeCategoryDialogBtn: document.querySelector('#closeCategoryDialogBtn'),
      categoryList: document.querySelector('#categoryList'),
      authScreen: document.querySelector('#authScreen'),
      loginForm: document.querySelector('#loginForm'),
      loginError: document.querySelector('#loginError'),
      currentUsername: document.querySelector('#currentUsername'),
      userMenu: document.querySelector('#userMenu'),
      userMenuBtn: document.querySelector('#userMenuBtn'),
      userDropdown: document.querySelector('#userDropdown'),
      logoutBtn: document.querySelector('#logoutBtn'),
      openAccountBtn: document.querySelector('#openAccountBtn'),
      accountDialog: document.querySelector('#accountDialog'),
      closeAccountDialogBtn: document.querySelector('#closeAccountDialogBtn'),
      accountForm: document.querySelector('#accountForm'),
      accountError: document.querySelector('#accountError'),
      openSettingsBtn: document.querySelector('#openSettingsBtn'),
      settingsDialog: document.querySelector('#settingsDialog'),
      closeSettingsDialogBtn: document.querySelector('#closeSettingsDialogBtn'),
      settingsForm: document.querySelector('#settingsForm'),
      settingsError: document.querySelector('#settingsError'),
      heroBadge: document.querySelector('#heroBadge'),
      heroTitle: document.querySelector('#heroTitle'),
      heroSubtitle: document.querySelector('#heroSubtitle')
    };

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      if (response.status === 204) return null;
      const data = await response.json();
      if (response.status === 401) showLogin();
      if (!response.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function showLogin() {
      state.user = null;
      els.authScreen.classList.remove('hidden');
      document.querySelector('#loginPassword').value = '';
      document.querySelector('#loginUsername').focus();
    }

    function hideLogin(user) {
      state.user = user;
      els.currentUsername.textContent = user.username;
      document.querySelector('#accountUsername').value = user.username;
      els.authScreen.classList.add('hidden');
    }

    async function bootstrap() {
      try {
        const user = await requestJSON('/api/session');
        hideLogin(user);
        await loadAll();
      } catch (error) {
        showLogin();
      }
    }

    async function login(event) {
      event.preventDefault();
      els.loginError.textContent = '';
      try {
        const user = await requestJSON('/api/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.querySelector('#loginUsername').value,
            password: document.querySelector('#loginPassword').value
          })
        });
        hideLogin(user);
        await loadAll();
      } catch (error) {
        els.loginError.textContent = error.message;
      }
    }

    function siteQueryURL() {
      const params = new URLSearchParams();
      if (state.category && state.category !== '全部') params.set('category', state.category);
      if (state.query) params.set('q', state.query);
      const suffix = params.toString();
      return suffix ? `/api/sites?${suffix}` : '/api/sites';
    }

    async function loadAll() {
      const [categories, sites, stats, settings] = await Promise.all([
        requestJSON('/api/categories'),
        requestJSON(siteQueryURL()),
        requestJSON('/api/stats'),
        requestJSON('/api/settings')
      ]);
      state.sites = sites;
      state.categories = categories;
      state.settings = settings;
      applySettings(settings);
      renderTabs(categories);
      renderCategoryOptions(categories);
      renderSites(sites);
      renderStats(stats);
    }

    function applySettings(settings) {
      document.title = settings.siteTitle;
      els.heroBadge.textContent = settings.badge;
      els.heroTitle.textContent = settings.heroTitle;
      els.heroSubtitle.textContent = settings.subtitle;
      document.querySelector('#siteTitleInput').value = settings.siteTitle;
      document.querySelector('#badgeInput').value = settings.badge;
      document.querySelector('#heroTitleInput').value = settings.heroTitle;
      document.querySelector('#subtitleInput').value = settings.subtitle;
    }

    async function loadSitesOnly() {
      state.sites = await requestJSON(siteQueryURL());
      renderSites(state.sites);
    }

    function renderStats(stats) {
      els.siteCount.textContent = stats.siteCount;
      els.categoryCount.textContent = stats.categoryCount;
      els.coverage.textContent = stats.coverage;
    }

    function renderTabs(categories) {
      els.tabs.innerHTML = '';
      categories.forEach(category => {
        const button = document.createElement('button');
        button.className = `tab${category === state.category ? ' active' : ''}`;
        button.type = 'button';
        button.textContent = category;
        button.addEventListener('click', async () => {
          state.category = category;
          renderTabs(categories);
          await loadSitesOnly();
        });
        els.tabs.appendChild(button);
      });
    }

    function renderCategoryOptions(categories, filter = '') {
      const keyword = filter.trim().toLowerCase();
      const options = categories
        .filter(category => category !== '全部')
        .filter(category => !keyword || category.toLowerCase().includes(keyword));

      els.categoryMenu.innerHTML = '';
      if (!options.length) {
        const empty = document.createElement('div');
        empty.className = 'category-empty';
        empty.textContent = filter ? '没有匹配分类，保存后会创建为新分类。' : '暂无可选分类，可以直接输入新分类。';
        els.categoryMenu.appendChild(empty);
        return;
      }

      options.forEach(category => {
        const option = document.createElement('button');
        option.className = `category-option${category === els.categoryInput.value ? ' active' : ''}`;
        option.type = 'button';
        option.innerHTML = '<span></span><small>已有</small>';
        option.querySelector('span').textContent = category;
        option.addEventListener('mousedown', event => event.preventDefault());
        option.addEventListener('click', () => {
          els.categoryInput.value = category;
          hideCategoryMenu();
          els.categoryInput.focus();
        });
        els.categoryMenu.appendChild(option);
      });
    }

    function showCategoryMenu() {
      renderCategoryOptions(state.categories, els.categoryInput.value);
      els.categoryMenu.classList.add('open');
    }

    function hideCategoryMenu() {
      els.categoryMenu.classList.remove('open');
    }

    function renderEmojiOptions(selectedIcon = emojiOptions[0]) {
      const matched = emojiOptions.includes(selectedIcon);
      const activeIcon = matched ? selectedIcon : emojiOptions[0];
      els.iconInput.value = activeIcon;
      els.emojiPreview.textContent = activeIcon;
      els.emojiGrid.innerHTML = '';

      emojiOptions.forEach(icon => {
        const button = document.createElement('button');
        button.className = `emoji-option${icon === activeIcon ? ' active' : ''}`;
        button.type = 'button';
        button.textContent = icon;
        button.title = icon;
        button.addEventListener('click', () => {
          renderEmojiOptions(icon);
          closeEmojiDialog();
        });
        els.emojiGrid.appendChild(button);
      });
    }

    function openEmojiDialog() {
      renderEmojiOptions(els.iconInput.value || emojiOptions[0]);
      els.emojiDialog.classList.add('open');
      els.emojiDialog.setAttribute('aria-hidden', 'false');
    }

    function closeEmojiDialog() {
      els.emojiDialog.classList.remove('open');
      els.emojiDialog.setAttribute('aria-hidden', 'true');
    }

    function renderGlowOptions(selectedGlow = glowOptions[0].value) {
      const matched = glowOptions.some(option => option.value === selectedGlow);
      const activeGlow = matched ? selectedGlow : glowOptions[0].value;
      els.glowInput.value = activeGlow;
      els.glowPicker.innerHTML = '';

      glowOptions.forEach(option => {
        const button = document.createElement('button');
        button.className = `glow-option${option.value === activeGlow ? ' active' : ''}`;
        button.type = 'button';
        button.textContent = option.name;
        button.style.setProperty('--swatch', option.value);
        button.addEventListener('click', () => renderGlowOptions(option.value));
        els.glowPicker.appendChild(button);
      });
    }

    function renderSites(sites) {
      els.grid.innerHTML = '';
      if (!sites.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '没有找到匹配的站点';
        els.grid.appendChild(empty);
        return;
      }

      sites.forEach(site => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = site.url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.style.setProperty('--glow', site.glow || 'rgba(96,165,250,.45)');
        card.innerHTML = `
          <div class="card-actions">
            <button class="icon-btn" type="button" data-action="edit" title="编辑">✎</button>
            <button class="icon-btn" type="button" data-action="delete" title="删除">×</button>
          </div>
          <div class="icon"></div>
          <h3></h3>
          <p></p>
          <span class="arrow">→</span>
        `;
        card.querySelector('.icon').textContent = site.icon || '🔗';
        card.querySelector('h3').textContent = site.name;
        card.querySelector('p').textContent = site.description || site.category;
        card.querySelector('[data-action="edit"]').addEventListener('click', event => {
          event.preventDefault();
          openDialog(site);
        });
        card.querySelector('[data-action="delete"]').addEventListener('click', async event => {
          event.preventDefault();
          await deleteSite(site);
        });
        els.grid.appendChild(card);
      });
    }

    function openDialog(site = null) {
      els.form.reset();
      els.formError.textContent = '';
      els.dialogTitle.textContent = site ? '编辑站点' : '新增站点';
      document.querySelector('#siteId').value = site?.id || '';
      document.querySelector('#name').value = site?.name || '';
      els.categoryInput.value = site?.category || '';
      document.querySelector('#url').value = site?.url || '';
      renderEmojiOptions(site?.icon || emojiOptions[0]);
      document.querySelector('#sort').value = site?.sort || '';
      renderGlowOptions(site?.glow || glowOptions[0].value);
      document.querySelector('#description').value = site?.description || '';
      renderCategoryOptions(state.categories, els.categoryInput.value);
      hideCategoryMenu();
      els.dialog.classList.add('open');
      els.dialog.setAttribute('aria-hidden', 'false');
      document.querySelector('#name').focus();
    }

    function closeDialog() {
      els.dialog.classList.remove('open');
      els.dialog.setAttribute('aria-hidden', 'true');
    }

    async function openCategoryDialog() {
      els.categoryList.innerHTML = '<div class="empty">正在加载分类...</div>';
      els.categoryDialog.classList.add('open');
      els.categoryDialog.setAttribute('aria-hidden', 'false');

      try {
        const categories = await requestJSON('/api/category-stats');
        renderCategoryManager(categories);
      } catch (error) {
        els.categoryList.innerHTML = `<div class="empty">${error.message}</div>`;
      }
    }

    function closeCategoryDialog() {
      els.categoryDialog.classList.remove('open');
      els.categoryDialog.setAttribute('aria-hidden', 'true');
    }

    function openAccountDialog() {
      els.accountError.textContent = '';
      document.querySelector('#accountUsername').value = state.user?.username || '';
      document.querySelector('#currentPassword').value = '';
      document.querySelector('#newPassword').value = '';
      els.accountDialog.classList.add('open');
      els.accountDialog.setAttribute('aria-hidden', 'false');
      els.userDropdown.classList.remove('open');
    }

    function closeAccountDialog() {
      els.accountDialog.classList.remove('open');
      els.accountDialog.setAttribute('aria-hidden', 'true');
    }

    function openSettingsDialog() {
      els.settingsError.textContent = '';
      if (state.settings) applySettings(state.settings);
      els.settingsDialog.classList.add('open');
      els.settingsDialog.setAttribute('aria-hidden', 'false');
      els.userDropdown.classList.remove('open');
    }

    function closeSettingsDialog() {
      els.settingsDialog.classList.remove('open');
      els.settingsDialog.setAttribute('aria-hidden', 'true');
    }

    function renderCategoryManager(categories) {
      els.categoryList.innerHTML = '';
      if (!categories.length) {
        els.categoryList.innerHTML = '<div class="empty">暂无分类</div>';
        return;
      }

      categories.forEach(category => {
        const row = document.createElement('div');
        row.className = 'category-row';
        row.innerHTML = `
          <div class="category-info">
            <b></b>
            <small></small>
          </div>
          <button class="danger-btn" type="button">删除</button>
        `;
        row.querySelector('b').textContent = category.name;
        row.querySelector('small').textContent = `${category.count} 个站点`;
        row.querySelector('button').addEventListener('click', () => deleteCategory(category));
        els.categoryList.appendChild(row);
      });
    }

    async function saveSite(event) {
      event.preventDefault();
      els.formError.textContent = '';
      const id = document.querySelector('#siteId').value;
      const payload = {
        name: document.querySelector('#name').value,
        category: els.categoryInput.value,
        url: document.querySelector('#url').value,
        icon: els.iconInput.value,
        sort: Number(document.querySelector('#sort').value || 0),
        glow: els.glowInput.value,
        description: document.querySelector('#description').value
      };

      try {
        await requestJSON(id ? `/api/sites/${id}` : '/api/sites', {
          method: id ? 'PUT' : 'POST',
          body: JSON.stringify(payload)
        });
        closeDialog();
        await loadAll();
      } catch (error) {
        els.formError.textContent = error.message;
      }
    }

    async function deleteSite(site) {
      if (!confirm(`确定删除「${site.name}」吗？`)) return;
      await requestJSON(`/api/sites/${site.id}`, { method: 'DELETE' });
      await loadAll();
    }

    async function deleteCategory(category) {
      const message = `确定删除「${category.name}」分类吗？该分类下的 ${category.count} 个站点会保留，但分类会被清空。`;
      if (!confirm(message)) return;

      try {
        await requestJSON(`/api/categories/${encodeURIComponent(category.name)}`, { method: 'DELETE' });
        if (state.category === category.name) state.category = '全部';
        await loadAll();
        await openCategoryDialog();
      } catch (error) {
        alert(error.message);
      }
    }

    async function saveAccount(event) {
      event.preventDefault();
      els.accountError.textContent = '';
      try {
        const user = await requestJSON('/api/account', {
          method: 'PUT',
          body: JSON.stringify({
            username: document.querySelector('#accountUsername').value,
            currentPassword: document.querySelector('#currentPassword').value,
            newPassword: document.querySelector('#newPassword').value
          })
        });
        hideLogin(user);
        closeAccountDialog();
      } catch (error) {
        els.accountError.textContent = error.message;
      }
    }

    async function saveSettings(event) {
      event.preventDefault();
      els.settingsError.textContent = '';
      try {
        const settings = await requestJSON('/api/settings', {
          method: 'PUT',
          body: JSON.stringify({
            siteTitle: document.querySelector('#siteTitleInput').value,
            badge: document.querySelector('#badgeInput').value,
            heroTitle: document.querySelector('#heroTitleInput').value,
            subtitle: document.querySelector('#subtitleInput').value
          })
        });
        state.settings = settings;
        applySettings(settings);
        closeSettingsDialog();
      } catch (error) {
        els.settingsError.textContent = error.message;
      }
    }

    async function logout() {
      await requestJSON('/api/logout', { method: 'POST' }).catch(() => null);
      els.userDropdown.classList.remove('open');
      showLogin();
    }

    function debounce(fn, delay = 250) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    els.search.addEventListener('input', debounce(async event => {
      state.query = event.target.value.trim();
      await loadSitesOnly();
    }));
    els.categoryInput.addEventListener('focus', showCategoryMenu);
    els.categoryInput.addEventListener('input', () => showCategoryMenu());
    els.categoryToggle.addEventListener('click', () => {
      if (els.categoryMenu.classList.contains('open')) {
        hideCategoryMenu();
      } else {
        els.categoryInput.focus();
        showCategoryMenu();
      }
    });
    els.addBtn.addEventListener('click', () => openDialog());
    els.emojiSelectBtn.addEventListener('click', openEmojiDialog);
    els.manageCategoriesBtn.addEventListener('click', openCategoryDialog);
    els.loginForm.addEventListener('submit', login);
    els.userMenuBtn.addEventListener('click', () => els.userDropdown.classList.toggle('open'));
    els.openAccountBtn.addEventListener('click', openAccountDialog);
    els.openSettingsBtn.addEventListener('click', openSettingsDialog);
    els.logoutBtn.addEventListener('click', logout);
    els.closeAccountDialogBtn.addEventListener('click', closeAccountDialog);
    els.closeSettingsDialogBtn.addEventListener('click', closeSettingsDialog);
    els.accountForm.addEventListener('submit', saveAccount);
    els.settingsForm.addEventListener('submit', saveSettings);
    els.closeBtn.addEventListener('click', closeDialog);
    els.cancelBtn.addEventListener('click', closeDialog);
    els.closeEmojiDialogBtn.addEventListener('click', closeEmojiDialog);
    els.closeCategoryDialogBtn.addEventListener('click', closeCategoryDialog);
    els.dialog.addEventListener('click', event => {
      if (event.target === els.dialog) closeDialog();
    });
    els.emojiDialog.addEventListener('click', event => {
      if (event.target === els.emojiDialog) closeEmojiDialog();
    });
    els.categoryDialog.addEventListener('click', event => {
      if (event.target === els.categoryDialog) closeCategoryDialog();
    });
    els.accountDialog.addEventListener('click', event => {
      if (event.target === els.accountDialog) closeAccountDialog();
    });
    els.settingsDialog.addEventListener('click', event => {
      if (event.target === els.settingsDialog) closeSettingsDialog();
    });
    document.addEventListener('click', event => {
      if (!event.target.closest('#categoryPicker')) hideCategoryMenu();
      if (!event.target.closest('#userMenu')) els.userDropdown.classList.remove('open');
    });
    els.form.addEventListener('submit', saveSite);

    bootstrap().catch(error => {
      els.grid.innerHTML = `<div class="empty">${error.message}</div>`;
    });
  </script>
</body>
</html>
