name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: Build Linux x64 release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build Linux x64 binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "1"
          OUTPUT: dist/navigation-linux-amd64
        run: bash ./build.sh

      - name: Generate checksum
        working-directory: dist
        run: sha256sum navigation-linux-amd64 > navigation-linux-amd64.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/navigation-linux-amd64
            dist/navigation-linux-amd64.sha256
